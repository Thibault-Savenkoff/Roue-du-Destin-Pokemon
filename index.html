<!DOCTYPE html>
<!-- Page principale de l'application "Roue du Destin - Fakemon"
     Cette page contient la roue de tirage aléatoire et les résultats générés. -->
<html lang="fr" class="bg-slate-900 text-white min-h-screen">
<head>
    <meta charset="UTF-8">
    <!-- Désactive le zoom manuel sur mobile pour un rendu cohérent -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roue du Destin - Fakemon</title>
    <!-- Tailwind CSS via CDN pour les classes utilitaires -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Police Google Fonts : Poppins (poids 400, 600, 800) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* === MODE TIKTOK ===
           En mode TikTok, on masque les éléments non essentiels pour
           afficher uniquement la roue en plein écran (idéal pour les vidéos). */
        .tiktok-mode header, .tiktok-mode #results-display, .tiktok-mode #output-section {
            display: none !important;
        }
        /* Centre verticalement le contenu et supprime les marges en mode TikTok */
        .tiktok-mode {
            justify-content: center !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }
        /* Agrandit légèrement la zone de roue pour remplir l'écran en mode TikTok */
        .tiktok-mode .w-full.max-w-sm {
            max-width: 100%;
            transform: scale(1.1);
        }
        /* Masque les boutons de contrôle en mode TikTok */
        .tiktok-mode #controls-row, .tiktok-mode #btn-generer {
            display: none !important;
        }
    </style>
</head>
<body class="font-['Poppins'] flex flex-col items-center justify-start min-h-screen p-4 pb-12 overflow-x-hidden">

    <!-- ===== EN-TÊTE ===== -->
    <header class="text-center w-full max-w-sm mb-6 mt-4">
        <div class="flex justify-between w-full text-slate-400 text-xs mb-2">
            <!-- Bouton qui bascule la classe "tiktok-mode" sur le body -->
            <button onclick="const on=document.body.classList.toggle('tiktok-mode');if(on)document.dispatchEvent(new CustomEvent('tiktok-start'));" class="hover:text-white flex items-center bg-slate-800 px-3 py-1 rounded-full border border-slate-700">📱 Mode TikTok</button>
            <button id="btn-son" onclick="this.textContent = toggleMute() ? '🔇' : '🔊'" class="hover:text-white flex items-center bg-slate-800 px-3 py-1 rounded-full border border-slate-700">🔊</button>
            <!-- Lien vers la page de paramètres (settings.html) -->
            <a href="settings.html" class="hover:text-white flex items-center bg-slate-800 px-3 py-1 rounded-full border border-slate-700">⚙️ Paramètres</a>
        </div>
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 mb-2">Roue du Destin</h1>
        <p class="text-slate-400 text-sm">Générateur de Pokémon</p>
    </header>

    <!-- ===== ZONE DE LA ROUE ===== -->
    <div class="w-full max-w-sm bg-slate-800 rounded-[2rem] shadow-[0_0_30px_rgba(0,0,0,0.6)] border-2 border-slate-700 p-6 mb-8 flex flex-col items-center">
        <!-- Titre dynamique affiché au-dessus de la roue (ex: "Choisir une région") ;
             mis à jour par le JS lors de chaque tirage -->
        <h2 id="roue-title" class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2 h-6 text-center w-full">Prêt à jouer</h2>
        
        <!-- Affiche le résultat gagnant de la roue actuelle ;
             mis à jour après chaque spin -->
        <div id="winner-display" class="text-2xl font-extrabold mb-6 h-8 text-center w-full transition-all drop-shadow-md"></div>
        
        <!-- Conteneur carré pour la roue (280×280 px) -->
        <div class="relative w-[280px] h-[280px] flex items-center justify-center">
            
            <!-- === POINTEUR CENTRAL (flèche + cercle "Spin") ===
                 Superposé par-dessus le canvas, non cliquable (pointer-events-none).
                 Il indique la section gagnante pointée vers le haut. -->
            <div class="absolute z-20 flex flex-col items-center justify-center pointer-events-none" style="top: 50%; left: 50%; transform: translate(-50%, -50%);">
                <!-- Triangle noir (ombre portée) formant la pointe de la flèche -->
                <div class="w-0 h-0 border-l-[12px] border-r-[12px] border-b-[20px] border-l-transparent border-r-transparent border-b-black absolute -top-[16px] z-10 drop-shadow-md"></div>
                <!-- Triangle blanc (corps principal de la flèche) légèrement plus grand -->
                <div class="w-0 h-0 border-l-[14px] border-r-[14px] border-b-[22px] border-l-transparent border-r-transparent border-b-white absolute -top-[18px] z-0 drop-shadow-md"></div>
                <!-- Cercle central cliquable affichant "Spin" ou le résultat en cours -->
                <div id="center-circle" class="bg-black text-white font-extrabold rounded-full w-16 h-16 flex items-center justify-center z-20 shadow-[0_0_15px_rgba(0,0,0,0.8)] border-[3px] border-white text-lg tracking-wide text-center leading-tight">
                    Spin
                </div>
            </div>
            
            <!-- Canvas HTML5 sur lequel le JS dessine les segments de la roue.
                 La résolution interne est 800×800 px (haute qualité),
                 mais l'affichage CSS est limité à 280×280 px via w-full h-full. -->
            <canvas id="wheel-canvas" width="800" height="800" class="w-full h-full rounded-full shadow-[0_0_20px_rgba(0,0,0,0.8)] border-[6px] border-slate-300 transform-gpu"></canvas>

        </div>
    </div>

    <!-- ===== BOUTONS DE CONTRÔLE ===== -->
    <!-- Ligne de deux boutons : RAPIDE (tire automatiquement une roue) et MANUEL (tire manuellement) -->
    <div class="flex gap-2 w-full max-w-sm mb-4" id="controls-row">
        <!-- Bouton RAPIDE : lance un spin sans animation longue -->
        <button id="btn-rapide" class="flex-1 flex items-center justify-center text-center bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 rounded-xl shadow-lg transform active:scale-95 transition-all text-sm">
            <span class="inline-flex items-center justify-center gap-2">
                <span aria-hidden="true">⚡</span>
                <span>RAPIDE</span>
            </span>
        </button>
        <!-- Bouton MANUEL : permet de déclencher chaque roue une à une -->
        <button id="btn-manuel" class="flex-1 flex items-center justify-center text-center bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl shadow-lg transform active:scale-95 transition-all text-sm">
            <span class="inline-flex items-center justify-center gap-2">
                <span aria-hidden="true">👆</span>
                <span>MANUEL</span>
            </span>
        </button>
    </div>
    <!-- Bouton AUTO : enchaîne automatiquement toutes les roues (mode complet) -->
    <button id="btn-generer" class="w-full max-w-sm flex items-center justify-center text-center bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition-all text-xl mb-4">
        <span class="inline-flex items-center justify-center gap-2">
            <span aria-hidden="true">🤖</span>
            <span>AUTO</span>
        </span>
    </button>
    <!-- Barre de progression ; masquée jusqu'au démarrage -->
    <div id="progression" class="w-full max-w-sm mb-8 hidden">
        <p id="progression-text" class="text-xs text-slate-500 font-mono mb-1 text-center"></p>
        <div class="w-full bg-slate-700 rounded-full h-1.5">
            <div id="progression-bar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-300" style="width:0%"></div>
        </div>
    </div>

    <!-- ===== RÉSUMÉ DES TIRAGES =====
         Panneau récapitulatif affiché après que toutes les roues ont tourné.
         Il est masqué par défaut (classe "hidden") et affiché par le JS. -->
    <div id="results-display" class="w-full max-w-sm space-y-3 mb-8 hidden">
        <h3 class="text-lg font-bold border-b border-slate-700 pb-2">Résumé du Tirage</h3>
        <!-- Liste remplie dynamiquement par le JS avec les résultats de chaque roue -->
        <ul id="summary-list" class="text-sm space-y-2 text-slate-300">
            <!-- Rempli en JS -->
        </ul>
    </div>

    <!-- ===== SORTIES GÉNÉRÉES =====
         Section affichée uniquement après la fin d'un tirage complet (AUTO).
         Contient deux zones de texte en lecture seule avec boutons "Copier". -->
    <div id="output-section" class="w-full max-w-sm space-y-6 hidden">
        <!-- Zone 1 : Prompt prêt à coller dans ChatGPT pour générer un Fakemon -->
        <div class="bg-slate-800 rounded-xl p-4 border border-blue-900 relative">
            <h3 class="text-sm font-bold text-blue-400 mb-2">Prompt ChatGPT</h3>
            <textarea id="prompt-output" readonly class="w-full bg-slate-900 text-slate-300 text-xs p-3 rounded border border-slate-700 h-32 focus:outline-none resize-none"></textarea>
            <!-- Bouton qui appelle copyToClipboard() avec l'ID du textarea -->
            <button onclick="copyToClipboard('prompt-output')" class="absolute top-3 right-3 bg-blue-600 hover:bg-blue-500 text-white text-xs px-3 py-1 rounded">Copier</button>
        </div>

        <!-- Zone 2 : Données structurées au format CSV (pour une utilisation dans un tableur, etc.) -->
        <div class="bg-slate-800 rounded-xl p-4 border border-green-900 relative">
            <h3 class="text-sm font-bold text-green-400 mb-2">Données CSV</h3>
            <textarea id="csv-output" readonly class="w-full bg-slate-900 text-slate-300 text-xs p-3 rounded border border-slate-700 h-24 focus:outline-none resize-none whitespace-pre"></textarea>
            <!-- Bouton qui appelle copyToClipboard() avec l'ID du textarea -->
            <button onclick="copyToClipboard('csv-output')" class="absolute top-3 right-3 bg-green-600 hover:bg-green-500 text-white text-xs px-3 py-1 rounded">Copier</button>
        </div>
    </div>

    <!-- Bouton Rejouer affiché après un tirage complet -->
    <button id="btn-rejouer" class="w-full max-w-sm hidden items-center justify-center gap-2 text-center bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl shadow-lg transform active:scale-95 transition-all text-sm mt-4 mb-8">
        🔄 Rejouer
    </button>

    <!-- Chargement du module JS principal qui gère toute la logique de la roue -->
    <script src="js/data.js"></script>
    <script src="js/sounds.js"></script>
    <script src="js/app.js"></script>
    <script>
        /**
         * Copie le contenu d'un textarea dans le presse-papier,
         * puis affiche temporairement "Copié !" sur le bouton correspondant.
         * @param {string} id - L'identifiant du textarea à copier.
         */
        function copyToClipboard(id) {
            const textarea = document.getElementById(id);
            const btn = textarea.nextElementSibling;
            const originalText = btn.innerText;
            const activeColor = id.includes('prompt') ? 'bg-blue-600' : 'bg-green-600';

            const showFeedback = () => {
                if (navigator.vibrate) navigator.vibrate(50);
                btn.innerText = "Copié !";
                btn.classList.replace(activeColor, 'bg-slate-600');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.replace('bg-slate-600', activeColor);
                }, 2000);
            };

            if (navigator.clipboard) {
                navigator.clipboard.writeText(textarea.value).then(showFeedback);
            } else {
                textarea.select();
                document.execCommand('copy');
                window.getSelection().removeAllRanges();
                showFeedback();
            }
        }
    </script>
</body>
</html>
